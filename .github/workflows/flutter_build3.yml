name: Build Flutter APK (3x)

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "URL download ZIP project Flutter"
        required: true
      tag:
        description: "Tag build"
        required: true
      build_type:
        description: "debug / release"
        required: true
        default: "release"
      only_analyze:
        description: "Hanya jalankan analyze (true/false)"
        required: false
        default: "false"

jobs:
  analyze:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.only_analyze == 'true' }}
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}" \
            -o project.zip \
            -w "\n=== HTTP Status: %{http_code} ===\n=== Final URL: %{url_effective} ===\n"
          echo ""
          echo "=== File Info ==="
          ls -lh project.zip
      - name: Extract ZIP
        run: |
          echo "=== Validating ZIP ==="
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            exit 1
          fi
          echo "✅ ZIP valid"
          unzip -q project.zip -d project_raw
          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)
          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          flutter-version: "3.41.9"
          channel: "stable"
          cache: true
      - name: Analyze Project Code
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Starting Automated Code Analysis ==="
          if [ -f "pubspec.yaml" ]; then
            flutter analyze > analyze_report.txt 2>&1 || true
            echo "[RESULT_ANALYZE]"
            cat analyze_report.txt
            echo "[END_RESULT_ANALYZE]"
            rm -f analyze_report.txt
          else
            echo "☕ Project native / gradlew terdeteksi!"
            echo "[RESULT_ANALYZE]"
            echo "❌ Fitur analyze hanya support project Flutter (pubspec.yaml tidak ditemukan)."
            echo "[END_RESULT_ANALYZE]"
          fi
      - name: Stop if Analyze Only
        if: ${{ github.event.inputs.only_analyze == 'true' }}
        run: |
          echo "Analyze-only mode aktif. Workflow dihentikan di sini."
          exit 1

  build:
    if: ${{ github.event.inputs.only_analyze != 'true' }}
    strategy:
      matrix:
        runner_id: [1, 2, 3]
      max-parallel: 3
      fail-fast: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: "Build #${{ matrix.runner_id }}"
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Download ZIP project
        run: |
          echo "=== Downloading ZIP (Runner ${{ matrix.runner_id }}) ==="
          echo "URL: ${{ github.event.inputs.zip_url }}"
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GH_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${{ github.event.inputs.zip_url }}" \
            -o project.zip \
            -w "\n=== HTTP Status: %{http_code} ===\n=== Final URL: %{url_effective} ===\n"
          echo ""
          echo "=== File Info ==="
          ls -lh project.zip
      - name: Extract ZIP
        run: |
          echo "=== Validating ZIP (Runner ${{ matrix.runner_id }}) ==="
          if ! unzip -t project.zip > /dev/null 2>&1; then
            echo "❌ File bukan ZIP valid!"
            exit 1
          fi
          echo "✅ ZIP valid"
          unzip -q project.zip -d project_raw
          SUB_DIR_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type d | wc -l)
          FILE_COUNT=$(find project_raw -maxdepth 1 -mindepth 1 -type f | wc -l)
          if [ "$SUB_DIR_COUNT" -eq 1 ] && [ "$FILE_COUNT" -eq 0 ]; then
            PROJECT_DIR=$(find project_raw -maxdepth 1 -mindepth 1 -type d | head -n 1)
          else
            PROJECT_DIR="project_raw"
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - name: Setup Flutter
        uses: subosito/flutter-action@main
        with:
          flutter-version: "3.41.9"
          channel: "stable"
          cache: true
      - name: Flutter Doctor
        run: flutter doctor
      - name: Get dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Running flutter pub get (Runner ${{ matrix.runner_id }}) ==="
          if [ -f "pubspec.yaml" ]; then
            timeout 120s flutter pub get || echo "⚠️ Gagal download package, coba lanjut..."
          else
            echo "☕ Bukan project Flutter standar, skip pub get!"
          fi
      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          echo "=== Building APK (Runner ${{ matrix.runner_id }}) ==="
          echo "Mode: ${{ github.event.inputs.build_type }}"
          if [ -f "pubspec.yaml" ]; then
            echo "🔥 Project Flutter Terdeteksi! Kompilasi via Flutter SDK..."
            flutter build apk --${{ github.event.inputs.build_type }}
          else
            echo "☕ Project Native Android Terdeteksi! Bypassing Flutter Core..."
            GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
            if [ -z "$GRADLE_PATH" ]; then
              echo "❌ ERROR: File 'gradlew' tidak ditemukan!"
              exit 1
            fi
            GRADLE_DIR=$(dirname "$GRADLE_PATH")
            cd "$GRADLE_DIR"
            chmod +x gradlew
            echo "🚀 Membakar APK menggunakan Gradle Native..."
            if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
              ./gradlew assembleDebug
            else
              ./gradlew assembleRelease
            fi
            cd -
          fi
      - name: Check APK Output
        run: |
          echo "=== APK Output Scanning (Runner ${{ matrix.runner_id }}) ==="
          echo "Mencari file APK di seluruh direktori..."
          find $GITHUB_WORKSPACE -name "*.apk"
          APK_FOUND=$(find $GITHUB_WORKSPACE -name "*.apk" | head -n 1)
          if [ -z "$APK_FOUND" ]; then
            echo "Error: Berkas biner APK beneran gak dicetak sama sekali oleh compiler."
            exit 1
          fi
          APK_PATH=$(echo "$APK_FOUND" | sed "s|$GITHUB_WORKSPACE/||")
          echo "✅ APK Sukses Ditemukan di Jalur: $APK_PATH"
          echo "PROJECT_DIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo ""
          echo "=== APK Size ==="
          ls -lh "$APK_FOUND"
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-${{ github.event.inputs.build_type }}-${{ github.event.inputs.tag }}-runner${{ matrix.runner_id }}
          path: ${{ env.PROJECT_DIR }}/${{ env.APK_PATH }}
          retention-days: 1
          if-no-files-found: error
      - name: Build Info
        if: always()
        run: |
          echo "========================================="
          echo "Runner ID: ${{ matrix.runner_id }}"
          echo "Build Type: ${{ github.event.inputs.build_type }}"
          echo "Tag: ${{ github.event.inputs.tag }}"
          echo "Status: ${{ job.status }}"
          echo "========================================="